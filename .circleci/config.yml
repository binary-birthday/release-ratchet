version: 2.1

orbs:
  rust: circleci/rust@1.6.1

jobs:
  test:
    docker:
      - image: cimg/rust:1.86
    steps:
      - checkout
      - rust/clippy:
          flags: --all-targets
      - rust/test

  release:
    docker:
      - image: cimg/rust:1.86
    steps:
      - add_ssh_keys:
          fingerprints:
            - "${DEPLOY_KEY_FINGERPRINT}"
      - checkout
      - run:
          name: Configure git
          command: |
            git config user.name "CircleCI"
            git config user.email "ci@circleci.com"
      - run:
          name: Install release-ratchet
          command: cargo install --path .
      - run:
          name: Prepare and release
          command: |
            release-ratchet prepare --no-branch || {
              RC=$?
              if [ $RC -eq 2 ]; then
                echo "Nothing to release."
                exit 0
              fi
              exit $RC
            }
            release-ratchet release
            git push origin main --tags

  build-and-publish:
    docker:
      - image: cimg/rust:1.86
    steps:
      - checkout
      - run:
          name: Build release binary
          command: |
            cargo build --release
            mkdir -p artifacts
            cp target/release/release-ratchet artifacts/release-ratchet-x86_64-unknown-linux-gnu
      - persist_to_workspace:
          root: artifacts
          paths:
            - "*"

  publish-github-release:
    docker:
      - image: cibuilds/github:0.13
    steps:
      - attach_workspace:
          at: artifacts
      - run:
          name: Publish release on GitHub
          command: |
            ghr -t "${GITHUB_TOKEN}" \
              -u "${CIRCLE_PROJECT_USERNAME}" \
              -r "${CIRCLE_PROJECT_REPONAME}" \
              -c "${CIRCLE_SHA1}" \
              -replace \
              "${CIRCLE_TAG}" \
              artifacts/

workflows:
  # Run tests on every push
  test:
    jobs:
      - test:
          filters:
            tags:
              only: /.*/

  # On main: test, then run release-ratchet to prepare+tag+push
  auto-release:
    jobs:
      - test:
          filters:
            branches:
              only: main
      - release:
          requires:
            - test
          filters:
            branches:
              only: main

  # On tag push: build binary and publish to GitHub Releases
  publish:
    jobs:
      - build-and-publish:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
      - publish-github-release:
          requires:
            - build-and-publish
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
