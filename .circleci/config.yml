version: 2.1

orbs:
  rust: circleci/rust@1.6.1

jobs:
  test:
    docker:
      - image: cimg/rust:1.86
    steps:
      - checkout
      - rust/clippy:
          flags: --all-targets
      - rust/test

  prepare:
    docker:
      - image: cimg/rust:1.86
    steps:
      - add_ssh_keys:
          fingerprints:
            - "${DEPLOY_KEY_FINGERPRINT}"
      - checkout
      - run:
          name: Configure git
          command: |
            git config user.name "CircleCI"
            git config user.email "ci@circleci.com"
      - run:
          name: Check if release needed
          command: |
            if git log -1 --format=%s | grep -q "^chore: release "; then
              echo "HEAD is a release commit. Skipping prepare."
              circleci-agent step halt
            fi
      - run:
          name: Build release-ratchet
          command: cargo build --release
      - run:
          name: Prepare release
          command: |
            ./target/release/release-ratchet prepare || {
              RC=$?
              if [ $RC -eq 2 ]; then echo "Nothing to release."; exit 0; fi
              exit $RC
            }
            # Push the release branch for PR review
            git push origin release-ratchet--release

  release:
    docker:
      - image: cimg/rust:1.86
    steps:
      - add_ssh_keys:
          fingerprints:
            - "${DEPLOY_KEY_FINGERPRINT}"
      - checkout
      - run:
          name: Check if this is a release commit
          command: |
            if ! git log -1 --format=%s | grep -q "^chore: release "; then
              echo "Not a release commit. Skipping."
              circleci-agent step halt
            fi
      - run:
          name: Configure git
          command: |
            git config user.name "CircleCI"
            git config user.email "ci@circleci.com"
      - run:
          name: Build release-ratchet
          command: cargo build --release
      - run:
          name: Tag and push
          command: |
            ./target/release/release-ratchet release
            git push origin --tags

            TAG=$(git describe --tags --abbrev=0)
            echo "export RELEASE_TAG=$TAG" >> "$BASH_ENV"

            mkdir -p /tmp/artifacts
            cp ./target/release/release-ratchet /tmp/artifacts/release-ratchet-x86_64-unknown-linux-gnu
      - run:
          name: Publish to GitHub Releases
          command: |
            GHR_VERSION=0.16.2
            curl -fsSL "https://github.com/tcnksm/ghr/releases/download/v${GHR_VERSION}/ghr_v${GHR_VERSION}_linux_amd64.tar.gz" | tar xz
            ./ghr_v${GHR_VERSION}_linux_amd64/ghr \
              -t "${GITHUB_TOKEN}" \
              -u "${CIRCLE_PROJECT_USERNAME}" \
              -r "${CIRCLE_PROJECT_REPONAME}" \
              -replace \
              "${RELEASE_TAG}" \
              /tmp/artifacts/

workflows:
  # Non-main branches: test only
  test:
    jobs:
      - test:
          filters:
            branches:
              ignore: main

  # Main branch: test → then either prepare or release
  # - If HEAD is a normal commit: prepare creates a release branch + PR
  # - If HEAD is a release commit (merged PR): tag + build + publish
  main:
    jobs:
      - test:
          filters:
            branches:
              only: main
      - prepare:
          requires: [test]
          filters:
            branches:
              only: main
      - release:
          requires: [test]
          filters:
            branches:
              only: main
