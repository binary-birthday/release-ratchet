version: 2.1

orbs:
  rust: circleci/rust@1.6.1

jobs:
  test:
    docker:
      - image: cimg/rust:1.86
    steps:
      - checkout
      - rust/clippy:
          flags: --all-targets
      - rust/test

  prepare:
    docker:
      - image: cimg/rust:1.86
    steps:
      - add_ssh_keys:
          fingerprints:
            - "${DEPLOY_KEY_FINGERPRINT}"
      - checkout
      - run:
          name: Configure git
          command: |
            git config user.name "CircleCI"
            git config user.email "ci@circleci.com"
      - run:
          name: Check if release needed
          command: |
            if git log -1 --format=%s | grep -q "^chore: release "; then
              echo "HEAD is a release commit. Skipping prepare."
              circleci-agent step halt
            fi
      - run:
          name: Install release-ratchet
          command: curl -fsSL https://raw.githubusercontent.com/binary-birthday/release-ratchet/main/install.sh | sh
      - run:
          name: Prepare release
          command: |
            release-ratchet prepare || {
              RC=$?
              if [ $RC -eq 2 ]; then echo "Nothing to release."; exit 0; fi
              exit $RC
            }
            # Push the release branch for PR review
            git push origin release-ratchet--release

  release:
    docker:
      - image: cimg/rust:1.86
    steps:
      - add_ssh_keys:
          fingerprints:
            - "${DEPLOY_KEY_FINGERPRINT}"
      - checkout
      - run:
          name: Check if this is a release merge
          command: |
            # Check HEAD itself, or if it's a merge commit, check its parents
            IS_RELEASE=false
            if git log -1 --format=%s | grep -q "^chore: release "; then
              IS_RELEASE=true
            elif git log -1 --format=%s | grep -q "^Merge.*release-ratchet--release"; then
              IS_RELEASE=true
            elif git log -1 --merges --format=%H | head -1 | xargs -I{} git log {} --format=%s -2 | grep -q "^chore: release "; then
              IS_RELEASE=true
            fi
            if [ "$IS_RELEASE" = "false" ]; then
              echo "Not a release merge. Skipping."
              circleci-agent step halt
            fi
      - run:
          name: Configure git
          command: |
            git config user.name "CircleCI"
            git config user.email "ci@circleci.com"
      - run:
          name: Install release-ratchet
          command: curl -fsSL https://raw.githubusercontent.com/binary-birthday/release-ratchet/main/install.sh | sh
      - run:
          name: Tag and push
          command: |
            release-ratchet release
            git push origin --tags
            echo "export RELEASE_TAG=$(git describe --tags --abbrev=0)" >> "$BASH_ENV"
      - run:
          name: Build release binary
          command: |
            cargo build --release
            mkdir -p /tmp/artifacts
            cp ./target/release/release-ratchet /tmp/artifacts/release-ratchet-x86_64-unknown-linux-gnu
      - run:
          name: Publish to GitHub Releases
          command: |
            GHR_VERSION=0.16.2
            curl -fsSL "https://github.com/tcnksm/ghr/releases/download/v${GHR_VERSION}/ghr_v${GHR_VERSION}_linux_amd64.tar.gz" | tar xz
            ./ghr_v${GHR_VERSION}_linux_amd64/ghr \
              -t "${GITHUB_TOKEN}" \
              -u "${CIRCLE_PROJECT_USERNAME}" \
              -r "${CIRCLE_PROJECT_REPONAME}" \
              -replace \
              "${RELEASE_TAG}" \
              /tmp/artifacts/

workflows:
  # Non-main branches: test only
  test:
    jobs:
      - test:
          filters:
            branches:
              ignore: main

  # Main branch: test → then either prepare or release
  # - If HEAD is a normal commit: prepare creates a release branch + PR
  # - If HEAD is a release commit (merged PR): tag + build + publish
  main:
    jobs:
      - test:
          filters:
            branches:
              only: main
      - prepare:
          requires: [test]
          filters:
            branches:
              only: main
      - release:
          requires: [test]
          filters:
            branches:
              only: main
