version: 2.1

orbs:
  rust: circleci/rust@1.6.1

jobs:
  test:
    docker:
      - image: cimg/rust:1.86
    steps:
      - checkout
      - rust/clippy:
          flags: --all-targets
      - rust/test

  build-linux:
    docker:
      - image: cimg/rust:1.86
    steps:
      - checkout
      - run:
          name: Build release binary
          command: cargo build --release
      - run:
          name: Package binary
          command: |
            mkdir -p artifacts
            cp target/release/release-ratchet artifacts/release-ratchet-x86_64-unknown-linux-gnu
      - persist_to_workspace:
          root: artifacts
          paths:
            - "*"

  publish-github-release:
    docker:
      - image: cibuilds/github:0.13
    steps:
      - attach_workspace:
          at: artifacts
      - run:
          name: Publish release on GitHub
          command: |
            ghr -t "${GITHUB_TOKEN}" \
              -u "${CIRCLE_PROJECT_USERNAME}" \
              -r "${CIRCLE_PROJECT_REPONAME}" \
              -c "${CIRCLE_SHA1}" \
              -replace \
              "${CIRCLE_TAG}" \
              artifacts/

workflows:
  test:
    jobs:
      - test:
          filters:
            tags:
              only: /.*/

  release:
    jobs:
      - build-linux:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
      - publish-github-release:
          requires:
            - build-linux
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
